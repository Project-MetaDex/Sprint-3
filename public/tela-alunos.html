<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaDex | Tela Alunos</title>
  <script src="./js/sessao.js"></script>
  <link rel="stylesheet" href="css/LandingPage.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="./css/tela-alunos.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>

  <nav class="Nav-Container">
    <img id="logo" src="./assets/icon/Logo-Nav.svg" alt="">
    <ul class="Nav-Options">
      <li class="Selected"><img src="./assets/icon/Icon-NavSelected.svg" alt=""><a href="index.html">Tela Inicial</a>
      </li>
      <li><a href="pokedex.html">Pokedex</a></li>
      <li><a href="ranking.html">Ranking</a></li>
      <li><a href="selecionar-simulacao.html">Simulações</a></li>
      <li><a href="tela-alunos.html">Alunos</a></li>
    </ul>
    <div class="Button-Container">
      <a href="#">
        <img src="assets/imgs/iconeUSER.png" class="user">
      </a>

    </div>
  </nav>


  <div class="tab-buttons">

    <button class="tab-btn active" content-id="DashGeral" onclick="trocarAba('DashGeral', this)">DashGeral</button>
    <button class="tab-btn" content-id="ListAlunos" onclick="trocarAba('ListAlunos', this)">Lista de Alunos</button>

    <div class="tab-contents">

      <div class="content" id="DashGeral">

        <div class="kpis">

          <div class="card-info">
            <h4>Total de Alunos</h4>
            <strong id="qtdAlunos" class="valor">-</strong>
          </div>

          <div class="card-info">
            <h4>Taxa de Abandono</h4>
            <strong class="valor">12%</strong>
          </div>

          <div class="card-info">
            <h4>Alunos em destaque</h4>
            <strong id="alunosDestaque" class="valor">-</strong>
          </div>

          <div class="card-info">
            <h4>Alunos em Risco</h4>
            <strong id="alunosRisco" class="valor">-</strong>
          </div>

        </div>

        <div class="grafico">
          <span class="grafico-titulo">Dispersão — Win Rate vs Tempo na Mentoria</span>
          <div class="scatter-legend" id="scatterLegend"></div>
          <div class="grafico-canvas-wrap">
            <canvas id="myChart" role="img"
              aria-label="Gráfico de dispersão mostrando Win Rate versus Tempo na Mentoria por aluno">Dados de
              dispersão: Win Rate vs Tempo na Mentoria por aluno.</canvas>
          </div>
        </div>

        <div class="painel-lateral">

          <div class="list-alunos destaque-wrap" id="listaDestaques">
            <h3>Alunos em Destaque</h3>

          </div>

          <div class="list-alunos" id="listaRiscos" >
            <h3>Alunos em Risco</h3>

          </div>

        </div>

      </div>


      <div class="content hidden" id="ListAlunos">

        <div class="lista-scroll" id="listaScroll">
        </div>

        <div class="paginacao" id="paginacao">
        </div>

      </div>

    </div>
  </div>

<script src="js/navbar.js"></script>
</body>

</html>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script
  src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

<script>

  function renderizarListasLaterais() {
    const containerDestaques = document.getElementById('listaDestaques');
    const containerRiscos = document.getElementById('listaRiscos');

    // Mantém apenas o título H3 fixo e limpa os cards antigos
    containerDestaques.innerHTML = '<h3>Alunos em Destaque</h3>';
    containerRiscos.innerHTML = '<h3>Alunos em Risco</h3>';

    // 1. Filtra do array global quem se encaixa na regra de DESTAQUE (>= 70% Win Rate)
    const alunosDestaque = dadosGlobais.filter(aluno => aluno.winRate >= 70);
    document.getElementById("alunosDestaque").innerHTML = alunosDestaque.length;

    // Ordena os destaques do maior Win Rate para o menor (Estilo Top 1, Top 2...)
    alunosDestaque.sort((a, b) => b.winRate - a.winRate);

    // Desenha os cards de destaque automaticamente
    alunosDestaque.forEach((aluno, index) => {
      containerDestaques.innerHTML += `
      <div class="card-alunoDestaque">
        <div class="avatar avatar-destaque" style="background: ${aluno.cor}33; color: ${aluno.cor}; border: 1.5px solid ${aluno.cor};">
          ${iniciaisNome(aluno.nome)}
        </div>
        <div class="info">
          <strong>${aluno.nome}</strong>
          <small>Win Rate: ${aluno.winRate}% · ${aluno.pontos || '0 pt'} · Rank ${aluno.posicaoRanking || '-'}</small>
        </div>
        <span class="badge-destaque">Top ${index + 1}</span>
      </div>
    `;
    });

    // 2. Filtra do array global quem se encaixa na regra de RISCO (< 50% Win Rate)
    const alunosRisco = dadosGlobais.filter(aluno => aluno.winRate < 50);
    document.getElementById("alunosRisco").innerHTML = alunosRisco.length;

    // Desenha os cards de risco automaticamente
    alunosRisco.forEach(aluno => {
      containerRiscos.innerHTML += `
      <div class="card-alunoRisco">
        <div class="avatar" style="background: #c0392b22; color: #c0392b; border: 1.5px solid #c0392b;">
          ${iniciaisNome(aluno.nome)}
        </div>
        <div class="info">
          <strong>${aluno.nome}</strong>
          <small>Win Rate: ${aluno.winRate}% · Requer Atenção</small>
        </div>
      </div>
    `;
    });
  }

  // =========================================================
  // FUNÇÕES AUXILIARES
  // =========================================================
  function corBarra(winRate) {
    if (winRate >= 70) return '#1D9E75';
    if (winRate >= 50) return '#BA7517';
    return '#c0392b';
  }

  function iniciaisNome(nome) {
    const partes = nome.trim().split(' ');
    return (partes[0][0] + (partes[1] ? partes[1][0] : '')).toUpperCase();
  }

  function irParaAluno() {
    window.location.href = 'tela-aluno.html';
  }

  // =========================================================
  // GRÁFICO DE DISPERSÃO
  // =========================================================
  function renderGrafico(alunos) {
    const diasValores = alunos.map(a => a.dias);
    const minDias = Math.max(0, Math.min(...diasValores) - 10); // 10 dias de margem
    const maxDias = Math.max(...diasValores) + 10;

    const legendEl = document.getElementById('scatterLegend');
    legendEl.innerHTML = '';

    alunos.forEach(a => {
      const span = document.createElement('span');
      span.className = 'scatter-legend-item';
      span.innerHTML = `
        <span class="scatter-legend-dot"
              style="background:${a.cor}33; border-color:${a.cor}">
        </span>${a.nome.split(' ')[0]}`;
      legendEl.appendChild(span);
    });

    const datasets = alunos.map(a => ({
      label: a.nome.split(' ')[0],
      data: [{ x: a.dias, y: a.winRate }],
      backgroundColor: a.cor + '33',
      borderColor: a.cor,
      pointBackgroundColor: '#fff',
      pointBorderColor: a.cor,
      pointBorderWidth: 2.5,
      pointRadius: 8,
      pointHoverRadius: 10,
      type: 'scatter',
    }));

    datasets.push({
      label: 'Meta 50%',
      data: [{ x: 0, y: 50 }, { x: 200, y: 50 }],
      type: 'line',
      borderColor: '#8956B9',
      borderWidth: 1.5,
      borderDash: [6, 4],
      pointRadius: 0,
      fill: false,
      tension: 0,
    });

    new Chart(document.getElementById('myChart'), {
      type: 'scatter',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 10, right: 20, bottom: 5, left: 5 } },
        plugins: {
          legend: { display: false },
          tooltip: {
            filter: item => item.dataset.label !== 'Meta 50%',
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.parsed.x} dias · ${ctx.parsed.y}% WR`,
            },
          },
        },
        scales: {
          x: {
            title: { display: true, text: 'Tempo na Mentoria (dias)', font: { size: 11 }, color: '#888' },
            min: minDias, max: maxDias,
            ticks: { font: { size: 10 }, color: '#888' },
            grid: { color: 'rgba(0,0,0,0.04)' },
          },
          y: {
            title: { display: true, text: 'Win Rate (%)', font: { size: 11 }, color: '#888' },
            min: 0, max: 100,
            ticks: { callback: v => v + '%', font: { size: 10 }, color: '#888' },
            grid: { color: 'rgba(0,0,0,0.04)' },
          },
        },
      },
    });
  }

  // =========================================================
  // LISTA PAGINADA
  // =========================================================
  const POR_PAGINA = 5;
  let paginaAtual = 1;
  let dadosGlobais = []; // guarda os alunos para a paginação poder acessar


  async function buscarElo(nickname) {
        try{

            const res = await fetch(`https://pokemonshowdown.com/users/${nickname}.json`);

            if(!res.ok){
                throw new Error(`Usuário não encontrado Status: ${res.status}`);
                return;
            }

            var user = await res.json()

            var elo = user.ratings?.gen9championsvgc2026regma?.elo;

            if(elo !== undefined ){
                return Math.round(elo);
            }else{
                console.log("Usuário ainda nao possue elo")
                return "---";
            }


        }catch (error) {
            console.error("Falha ao buscar os dados de Usuário:", error);
        }

    }

  function renderPagina(pagina) {
  paginaAtual = pagina;
  const alunos = dadosGlobais;
  const totalPaginas = Math.ceil(alunos.length / POR_PAGINA);
  const inicio = (pagina - 1) * POR_PAGINA;
  const fatia = alunos.slice(inicio, inicio + POR_PAGINA);

  document.getElementById('listaScroll').innerHTML = fatia.map(a => `
    <div class="info-aluno">
      <div class="imagem-perfil">${iniciaisNome(a.nome)}</div>
      <div class="nome">
        <small>Nome</small>
        <strong>${a.nome}</strong>
      </div>
      <div class="tx-vitoria">
        <small>Taxa de Vitória</small>
        <div class="container-bar">
          <div class="skill-bar">
            <div class="bar-preenchida"
                 style="width:${a.winRate}%; background:${corBarra(a.winRate)};"></div>
          </div>
          <strong>${a.winRate}%</strong>
        </div>
      </div>
      <div class="qtd-pontos">
        <small>Elo</small>
        <strong class="elo-placeholder" data-nickname="${a.nickname}">Carregando...</strong>
      </div>
      <div class="qtd-camp">
        <small>Ranking</small>
        <strong>${a.posicaoRanking}º</strong>
      </div>
      <button class="btn-verPerfil" onclick="irParaAluno()">Ver Perfil</button>
    </div>
  `).join('');

  // === PASSO CRUCIAL: Atualizar os Elos de forma assíncrona após renderizar ===
  document.querySelectorAll('.elo-placeholder').forEach(async (elemento) => {
    const nickname = elemento.getAttribute('data-nickname');
    const eloObtido = await buscarElo(nickname);
    elemento.innerHTML = eloObtido;
  });

  // Linhas restantes da paginação...
  const pag = document.getElementById('paginacao');
  if (totalPaginas <= 1) { pag.innerHTML = ''; return; }

  let html = `<span>${inicio + 1}–${Math.min(inicio + POR_PAGINA, alunos.length)} de ${alunos.length}</span>`;
  html += `<button class="btn-pag" onclick="renderPagina(${pagina - 1})" ${pagina === 1 ? 'disabled' : ''}>&#8249;</button>`;
  for (let i = 1; i <= totalPaginas; i++) {
    html += `<button class="btn-pag ${i === pagina ? 'ativo' : ''}" onclick="renderPagina(${i})">${i}</button>`;
  }
  html += `<button class="btn-pag" onclick="renderPagina(${pagina + 1})" ${pagina === totalPaginas ? 'disabled' : ''}>&#8250;</button>`;
  pag.innerHTML = html;
}

  // =========================================================
  // TROCA DE ABAS
  // =========================================================
  function trocarAba(idDaAba, elementoClicado) {
    document.querySelectorAll('.content').forEach(aba => aba.classList.add('hidden'));
    document.getElementById(idDaAba).classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    elementoClicado.classList.add('active');
  }

  // =========================================================
  // INICIALIZAÇÃO — busca os dados e renderiza tudo
  // =========================================================
  function gerarCores(quantidade) {
    return Array.from({ length: quantidade }, function (_, i) {
      const hue = Math.round((360 / quantidade) * i);
      return `hsl(${hue}, 65%, 55%)`;
    });
  }

  function inicializar() {
    fetch(`usuarios/listarAlunos/${sessionStorage.ID_USUARIO}`)
      .then(function (resp) {
        if (resp.ok) {
          resp.json().then(function (dados) {

            // injeta a cor em cada aluno pelo índice
            const cores = gerarCores(dados.length);
            dados = dados.map(function (aluno, index) {
              aluno.cor = cores[index] || '#888888';
              return aluno;
            });

            dadosGlobais = dados;
            renderGrafico(dadosGlobais);
            renderPagina(1);
            renderizarListasLaterais();

            // Preenchendo as KPIs
            document.getElementById("qtdAlunos").innerHTML = dados.length;

          });
        } else {
          console.log('Erro ao buscar alunos: ' + resp.status + ' ' + resp.statusText);
        }
      })
      .catch(function (erroDeRede) {
        console.log('Erro de conexão com o servidor:', erroDeRede);
      });
  }

  inicializar();
</script>

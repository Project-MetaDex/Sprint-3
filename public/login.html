<script>

 function realizarLogin() {

 var nomeVar = nome_input.value;
 var emailVar = email_input.value;
 var senhaVar = senha_input.value;

 if (nomeVar == "" || emailVar == "" || senhaVar == "") {
 alert("Por favor, preencha todos os campos!");
 return false;
 } else if (senhaVar.length < 8) {
 alert("A senha deve conter pelo menos 8 caracteres!");
 return false;
 }

 console.log(`Iniciando autenticação para o usuario: ${nomeVar} ${emailVar}`);

 // 3. FETCH (POST): Envia os dados estruturados para o seu Node.js
 fetch("/usuarios/autenticar", {
 method: "POST",
 headers: {
 "Content-Type": "application/json"
 },
 body: JSON.stringify({
 nomeServer: nomeVar,
 emailServer: emailVar,
 senhaServer: senhaVar
 })
 })
 .then(function (resposta) {
 if (resposta.ok) {
 resposta.json().then(function (dadosUsuario) {
 console.log("Login autorizado! Dados salvos na sessão:", dadosUsuario);

 sessionStorage.ID_USUARIO = dadosUsuario.idUsuario;
 sessionStorage.NOME_USUARIO = dadosUsuario.nome;
 sessionStorage.EMAIL_USUARIO = dadosUsuario.email;
 sessionStorage.NICK_USUARIO = dadosUsuario.nickname;
 sessionStorage.TOKEN_MENTOR = dadosUsuario.tokenMentor;
 sessionStorage.TIPO_USUARIO = dadosUsuario.tipoConta;
 sessionStorage.DATA_CADASTRO = dadosUsuario.dataCadastro;

 // Condição para direcionar para a tela correta:
 if (dadosUsuario.tipoConta == "Mentor") {
 window.location = "PerfilMentor.html";
 } else {
 window.location = "PerfilAluno.html";
 }
 });

 } else {
 console.log("Erro na autenticação: Credenciais inválidas.");
 alert("Dados de login incorretos! Verifique suas credenciais.");
 }
 })
 .catch(function (erroDeRede) {
 console.log("Erro de conexão com o servidor:", erroDeRede);
 alert("Não foi possível conectar ao servidor.");
 });

 return false;
 }

</script>

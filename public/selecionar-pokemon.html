<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção Pokémon</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/selecao-pokemon.css">
</head>
<body>
    <!-- Inicio Navbar -->

    <nav class="Nav-Container">
        <img onclick="Side('Open')" id="options" src="assets/icon/Icon-Hanburguer.svg" alt="" />

        <img id="logo" src="./assets/icon/Logo-Nav.svg" alt="" />

        <ul class="Nav-Options">
            <li class="Selected">
                <img src="./assets/icon/Icon-NavSelected.svg" alt="" /><a href="index.html">Home</a>
            </li>
            <li><a href="cadastro.html">Pokedex</a></li>
            <li><a href="cadastro.html">Ranks</a></li>
            <li><a href="cadastro.html">Team Buider</a></li>
            <li><a href="cadastro.html">Battle Simulator</a></li>
        </ul>

        <div class="Button-Container">
            <a href="#">
                <img src="assets/imgs/iconeUSER.png" class="user">
            </a>
        </div>
    </nav>

    <aside style="display: none" class="Side-Container">
        <button onclick="Side('Close')">
            <img id="Close-Side" src="assets/icon/Icon-Close.svg" alt="" />
        </button>

        <div class="Side-Flex">
            <div class="Perfil">
                <img src="assets/icon/Icon-User.svg" alt="" />
                <button class="Button-Side Login-Side" onclick="window.location.href = './login.html'">
                    Entrar
                </button>
            </div>

            <ul class="Side-Options">
                <li class="Selected">
                    <img src="./assets/icon/Icon-NavSelected.svg" alt="" /><a href="index.html">Home</a>
                </li>
                <li><a href="cadastro.html">Pokedex</a></li>
                <li><a href="cadastro.html">Ranks</a></li>
                <li><a href="cadastro.html">Team Buider</a></li>
                <li><a href="cadastro.html">Battle Simulator</a></li>
            </ul>

            <img class="Side-Logo" src="./assets/icon/Logo-Nav.svg" alt="" />
        </div>
    </aside>

    <!-- Fim Navbar -->

    <main class="containerSelecaoPokemon">
        <section class="containerPesquisa">
            <h2>Selecione um Pokémon</h2>
            <p>Escolha o Pokémon que será usado na simulação de batalha.</p>

            <div class="areaPesquisa">
                <input type="text" id="barraPesquisa" placeholder="Pesquisar por nome ou número">

                <div class="containerFilter">
                    <span class="setaFiltro"><</span>

                    <ul class="filter">
                        <li><button class="btnFilter" id="water" onclick="Filter('water')"><img class="imgTipo" src="assets/icon/tipo/Agua.svg" alt="Água"></button></li>
                        <li><button class="btnFilter" id="dragon" onclick="Filter('dragon')"><img class="imgTipo" src="assets/icon/tipo/Dragão.svg" alt="Dragão"></button></li>
                        <li><button class="btnFilter" id="electric" onclick="Filter('electric')"><img class="imgTipo" src="assets/icon/tipo/Eletrico.svg" alt="Elétrico"></button></li>
                        <li><button class="btnFilter" id="fairy" onclick="Filter('fairy')"><img class="imgTipo" src="assets/icon/tipo/Fada.svg" alt="Fada"></button></li>
                        <li><button class="btnFilter" id="ghost" onclick="Filter('ghost')"><img class="imgTipo" src="assets/icon/tipo/Fantasma.svg" alt="Fantasma"></button></li>
                        <li><button class="btnFilter" id="fire" onclick="Filter('fire')"><img class="imgTipo" src="assets/icon/tipo/Fogo.svg" alt="Fogo"></button></li>
                        <li><button class="btnFilter" id="ice" onclick="Filter('ice')"><img class="imgTipo" src="assets/icon/tipo/Gelo.svg" alt="Gelo"></button></li>
                        <li><button class="btnFilter" id="grass" onclick="Filter('grass')"><img class="imgTipo" src="assets/icon/tipo/Grama.svg" alt="Grama"></button></li>
                        <li><button class="btnFilter" id="bug" onclick="Filter('bug')"><img class="imgTipo" src="assets/icon/tipo/Inseto.svg" alt="Inseto"></button></li>
                        <li><button class="btnFilter" id="fighting" onclick="Filter('fighting')"><img class="imgTipo" src="assets/icon/tipo/Lutador.svg" alt="Lutador"></button></li>
                        <li><button class="btnFilter" id="steel" onclick="Filter('steel')"><img class="imgTipo" src="assets/icon/tipo/Metal.svg" alt="Metal"></button></li>
                        <li><button class="btnFilter" id="normal" onclick="Filter('normal')"><img class="imgTipo" src="assets/icon/tipo/Normal.svg" alt="Normal"></button></li>
                        <li><button class="btnFilter" id="dark" onclick="Filter('dark')"><img class="imgTipo" src="assets/icon/tipo/Noturno.svg" alt="Noturno"></button></li>
                        <li><button class="btnFilter" id="rock" onclick="Filter('rock')"><img class="imgTipo" src="assets/icon/tipo/Pedra.svg" alt="Pedra"></button></li>
                        <li><button class="btnFilter" id="psychic" onclick="Filter('psychic')"><img class="imgTipo" src="assets/icon/tipo/Psiquico.svg" alt="Psíquico"></button></li>
                        <li><button class="btnFilter" id="ground" onclick="Filter('ground')"><img class="imgTipo" src="assets/icon/tipo/Terra.svg" alt="Terra"></button></li>
                        <li><button class="btnFilter" id="poison" onclick="Filter('poison')"><img class="imgTipo" src="assets/icon/tipo/Veneno.svg" alt="Veneno"></button></li>
                        <li><button class="btnFilter" id="flying" onclick="Filter('flying')"><img class="imgTipo" src="assets/icon/tipo/Voador.svg" alt="Voador"></button></li>
                    </ul>

                    <span class="setaFiltro">></span>
                </div>
            </div>
        </section>

        <section class="containerPokemonList">
            <h3>Lista de Pokémon disponíveis</h3>

            <div class="containerCard"></div>
        </section>
    </main>

    <script src="js/selecao-pokemon.js"></script>
</body>
</html>

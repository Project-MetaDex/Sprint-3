<script>

  function realizarCadastro() {

    var nomeVar = nome.value;
    var nicknameVar = nickname.value;
    var emailVar = email.value;
    var senhaVar = senha.value;
    var confimacaoSenhaVar = confimacaoSenha.value;
    var tokenVar = tokenMentor.value;

    if (nomeVar == "" || nicknameVar == "" || emailVar == "" || senhaVar == "" || confimacaoSenhaVar == "" || tokenVar == "") {
      alert("Por favor, preencha todos os campos!");
      return false;
    } else if (emailVar.indexOf("@") == -1 || emailVar.indexOf(".") == -1) {
      alert("Por favor, insira um endereço de e-mail válido!");
      return false;
    } else if (senhaVar.length < 8) {
      alert("A senha deve conter pelo menos 8 caracteres!");
      return false;
    } if (senhaVar != confimacaoSenhaVar) {
      alert("A senha e a confirmação de senha não coincidem!");
      return false;
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        nicknameServer: nicknameVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        tokenServer: tokenVar
      })
    })
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then(function (dadosUsuario) {
            console.log("Cadastro realizado com sucesso!")

            // AÇÕES 
            window.location = "login.html";

          });
        } else {
          console.log("Erro ao realizar cadastro: Dados invalidos")
        }
      }).catch(function (erroDeRede) {

        console.log("Erro de conexão com o servidor:", erroDeRede);

      });

    return false;
  }

</script>
